display_information:
  name: Wingman
  description: Remote GitHub Copilot orchestration via Slack
  background_color: "#1a1a2e"
  long_description: |
    Wingman lets you orchestrate GitHub Copilot CLI agents on your machines
    remotely from Slack — including from your phone. Create per-project channels,
    send prompts, approve tool executions, and manage multiple machines from a
    single Slack workspace.

features:
  bot_user:
    display_name: Wingman
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  slash_commands:
    - command: /wm
      description: Wingman — manage projects and Copilot sessions
      usage_hint: "[machine:] <command> [args] — e.g. create my-app, status, model gpt-5"
      should_escape: false

oauth_config:
  scopes:
    bot:
      # Channel management
      - channels:manage        # Create and archive project channels
      - channels:read          # List and find channels
      - channels:history       # Read message history
      - channels:join          # Join channels the bot is invited to
      # Messaging
      - chat:write             # Send messages and thread replies
      - chat:write.public      # Post in channels without joining first
      # Files
      - files:read             # Access uploaded file metadata and content
      - files:write            # Upload files (plan attachments)
      # Reactions (for permission approvals)
      - reactions:read
      - reactions:write
      # Groups (private channels, if needed)
      - groups:read
      - groups:history
      - groups:write
      # User info (for display names in logs)
      - users:read
      # Interactivity (button clicks for permission/question flows)
      - im:history
      # Slash commands
      - commands

settings:
  event_subscriptions:
    bot_events:
      - message.channels       # Messages in public channels (prompts in project channels)
      - message.groups         # Messages in private channels
  interactivity:
    is_enabled: true           # Required for Block Kit button actions
  org_deploy_enabled: false
  socket_mode_enabled: true    # Required — Wingman uses Socket Mode (no public URL needed)
  token_rotation_enabled: false
